    .abstract-text,
    .bio-text {
      text-align: justify;
      color: var(--text-default);
      font-size: 1.05rem;
      margin: 0;

    /* Error View */
    .error-container {
      text-align: center;
      padding: 4rem 2rem;
      background-color: var(--bg-white);
      border-radius: 24px;
      border: 1px solid var(--border-color);

    /* Responsive */
    @media (max-width: 900px) {
      .profile-card {
        grid-template-columns: 1fr;
      }

      .profile-sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding: 3rem 2rem 2rem;
      }

      .back-btn-container {
        margin-bottom: 1.5rem;
        justify-content: center;
      }

      .profile-main {
        padding: 3rem 2rem;
        gap: 2.5rem;

  <script>

    const speakersData = {
      tba: {
        name: "To be announced",

      },
      masiero: {
        name: "Federico Masiero",
        avatar: "assets/speakers/masiero.jpg",
        status: "",
        affiliation: "Technical University of Munich",
        title: " New Approaches to Magnetic Methods for Robotics",
        abstract: "Magnetic fields have become a powerful tool in micro- and nanorobotics, enabling wireless actuation, localization, and control in environments where tethered or line-of-sight approaches are impractical. Their ability to penetrate biological tissues and many non-magnetic materials has made magnetic methods especially attractive for in vivo medical robotics. In this talk, I will build on this perspective to show how the same physical principles can also enable intuitive human–machine interfaces for mesoscale robotic systems.The presentation will discuss recent work in which permanent magnets, magnetized materials, and compact magnetic sensor arrays are used to sense user intention and support robot interaction. Examples will span wearable robotics, where magnetic tracking can provide low-footprint motion sensing for assistive devices; collaborative robotics, where passive magnetic markers worn by a human operator enable novel possibilities for Human-Robot Interaction; and bionics, where implanted magnets can be tracked to control robotic limbs and vibrated to provide kinesthetic feedback.",
        bio: "Federico Masiero is an Italian Postdoctoral Researcher at the Munich Institute of Robotics and Machine Intelligence (MIRMI), at the Technical University of Munich (TUM), Germany. During his PhD at Scuola Superiore Sant’Anna, he worked towards the development of novel, groundbreaking technologies for amputees, based on implanted magnets. Since then, his research goal has been to redefine the way in which humans interact with robotic devices, exploiting magnetic sensing. His research topics span multiple areas, including magnetic modeling and sensing, physical human-robot interaction, and wearable robotics."
      },
      garabini: {
        name: "Manolo Garabini",
        avatar: "assets/speakers/garabini.jpg",
        status: "",
        affiliation: "Università di Pisa",
        title: "Modular Multimodal Robots: the mechatronics behind the next robot generation",
        abstract: "Recent advances in Artificial Intelligence have dramatically expanded robots' capabilities in perception, reasoning, and decision-making. However, the next leap in robotics will not be driven by software alone. It requires a new generation of robotic platforms designed to be inherently modular, multimodal, and reconfigurable, enabling rapid adaptation to diverse tasks, environments, and human needs. This talk explores the mechatronic principles behind Modular Multimodal Robots, presenting an integrated approach where mechanical design, embedded electronics, sensing, actuation, and AI are conceived as a unified system rather than independent components. By combining modular hardware architectures with multimodal perception—including vision, force, tactile, and proprioceptive sensing—robots can achieve greater robustness, flexibility, and scalability across industrial, service, and research applications. The presentation will discuss the key technological challenges in designing these next-generation robotic systems, including modular actuation, distributed control, sensor integration, communication architectures, and AI-ready hardware platforms. Through practical examples and emerging research trends, it will illustrate how advances in mechatronics are laying the foundation for robots that are easier to customize, upgrade, and deploy in increasingly complex real-world scenarios. Ultimately, the talk argues that the future of robotics lies in the convergence of modular mechatronics and multimodal intelligence, providing the physical infrastructure required to unlock the full potential of embodied AI and accelerate the development of versatile, general-purpose robotic systems.",
        bio: "Manolo Garabini graduated in Mechanical Engineering and received a Ph.D. degree in Robotics from the University of Pisa where he is currently employed as an Associate Professor. His main research interests are in the design, planning, and control of soft and adaptive robots, from actuators to end-effectors (hands, grippers, feet), to complex multi-dof systems. A part of his activity has been devoted to theoretically proving the effectiveness of soft and adaptive robots in high performance, high efficiency, and resilient tasks via analytical and numerical optimization tools. He contributed to the realization of modular Variable Stiffness Actuators. He contributed to the design of the joints and the lower body of the humanoid robot WALK-MAN and participated in the DARPA Robotics Challenge and at a field test in Amatrice, Italy after a disastrous earthquake event. Moreover, he co-designed hardware and software of a dual-arm robot - WRAPP-up - for flexible picking and palletizing of goods, and of a robot for film unwrapping. Recently he contributed to the development of several algorithms, based on optimal control and learning, for motion planning and control in minimum time and under uncertainty. He has been the Principal Investigator in the THING H2020 EU Research Project for the University of Pisa, the coordinator of the NI H2020 project, and of the Dysturbance sub-project of the EUROBENCH H2020 project. He is now the PI of the personal grant FISA-2023 OCCAM and he is the co-founder of two companies, qbrobotics s.r.l., and XStar Motion s.r.l."
      },
      saveriano: {
        name: "Matteo Saveriano",
        avatar: "assets/speakers/saveriano.jpg",
        status: "",
        affiliation: "Università di Trento",
        title: "The Role of Energy and Geometry in Contact-Rich Manipulation",
        abstract: "Robotic manipulation demands for sophisticated control policies and accurate management of the forces exchanged with the environment. While learning-based controllers have shown a great potential in learning complex policies, safety guarantees during the learning and execution phases are still missing. In this talk, I will present recent results on stability- and passivity-based learning-control and its application in contact-rich robotic manipulation and manifold data.",
        bio: "Matteo Saveriano is an Associate Professor at the Department of Industrial Engineering (DII), University of Trento. Before, he was an Assistant Professor at the University of Innsbruck and a Postdoctoral Researcher at the German Aerospace Center (DLR). He received a Ph.D. degree cum laude in 2017 from the Technical University of Munich, Germany. His research is at the intersection of control theory and machine learning, with a focus on safe and efficient robot learning. His research received several awards, including the Honorable Mention Award for IEEE RA-L 2025. He is the coordinator of the EU HE project INVERSE. He also serves as an Associate Editor for IEEE Robotics and Automation Letters (RA-L), IEEE Transactions on Robotics (T-RO), and The International Journal of Robotics Research (IJRR)."
      },
      khatib: {
        name: "Oussama Khatib",
        avatar: "assets/speakers/Khatib.jpg",
        status: "Special Guest",
        affiliation: "Stanford University",
        title: "Act I Roundtable Panelist",
        abstract: "Prof. Oussama Khatib will participate in the Roundtable discussion for Act I, exploring the balance between physical mechatronic design and algorithmic control in safety-critical robotics.",
        bio: "Oussama Khatib's research in robotics focuses on novel control architectures, algorithms, sensing, and human-friendly designs for advanced capabilities in complex environments. With an emphasis on enabling robots to interact cooperatively and safely with humans and the physical world, his studies bring understanding of human movement for therapy, athletic training, and performance enhancement. This work on understanding human cognitive task representation and physical skills is enabling transfer for increased robot autonomy. With these core capabilities, his group is exploring applications in healthcare and wellness, industry and service, farms and smart cities, and dangerous and unreachable settings – deep in oceans, mines, and space."
      },
      kirschner: {
        name: "Robin Kirschner",
        avatar: "assets/speakers/kirschner.jpg",
        status: "",
        affiliation: "Technical University of Munich",
        title: "Certifiable Safe Human–Robot Interaction Starts with Holistic Physical Design",
        abstract: "As robots increasingly move from controlled industrial environments into healthcare, homes, and public spaces, the challenge is no longer solely achieving advanced functionality, but demonstrating safety in a way that is measurable, trustworthy, and certifiable. While technological capabilities continue to advance rapidly, the deployment of robotic systems remains constrained by the need for rigorous safety verification and certification—requirements rooted in society’s demand for trustworthy automation. This talk argues that certifiable safe human–robot interaction (HRI) must begin with a holistic view of physical design. Safety cannot be treated as an afterthought or delegated exclusively to software intelligence. Instead, it emerges from the interplay between a robot’s morphological properties, such as geometry, mass, compliance, and actuation, and its internal characteristics, including control strategies and dynamic behavior. At the core of safety assessment lies risk evaluation, which combines the severity of potential harm with the probability of its occurrence. Quantifying these factors requires a deep understanding of human biomechanics: how human tissues, body regions, and individuals respond to mechanical contact with robotic systems. Equally important is a comprehensive characterization of robot performance during physical interaction, where mechanical design and controller behavior jointly determine the forces, energies, and contact dynamics experienced by humans. Drawing from recent advances in injury biomechanics, physical human–robot interaction testing, and safety engineering, the talk will highlight how integrated consideration of human response models and robot design enables the development of transferable, verifiable, and ultimately certifiable safety methodologies. By linking physical design choices directly to measurable human-centered safety outcomes, we can establish the foundation for the next generation of trustworthy robotic systems capable of operating safely alongside people in real-world environments.",
        bio: "Robin Jeanne Kirschner received the B.Sc. degree in sports engineering and the M.Sc. degree in mechanical engineering from the Chemnitz University of Technology (CUT), Chemnitz, Ger many, in 2016 and 2019, respectively, with research visit at Nagoya University at the Assistive Robotics Research Group. She currently leads the AI Robot Performance and Safety Center at the Munich Institute of Robotics and Machine Intelligence (MIRMI), Technical University of Munich (TUM), Munich, Germany, and leads the research group on Biomechanics and Robotics in Orthopaedics within the Orthopaedics and Sportorthopaedics Department at TUM hospital. Her work focuses on developing concepts for physical and cognitive safety for human robot interaction."
      },
      russo: {
        name: "Matteo Russo",
        avatar: "assets/speakers/russo.jpg",
        status: "",
        affiliation: "Università di Roma Tor Vergata",
        title: "Robot design: Reclaiming hardware in the age of AI",
        abstract: "Since 2022, Large Language Models have been driving a critical shift in robotics, with research funding and private investments neglecting capital- and time-intensive hardware development in favor of the immediate returns of AI. Can we sustain this change in the long term? Embodied AI seeks to reach unstructured environments, but software cannot compensate for the hardware bottleneck that prevents robots from accessing human-designed spaces or wild terrains. This talk traces the tension between robot bodies and brains from the automata of antiquity up to the rise of industrial robotics. With this brief historical overview, I will show how millennia of mechanical ingenuity have integrated both body and brain functions into mechanical design and outline the risks and challenges of the body/brain separation driven by current software trends.",
        bio: "Matteo Russo is an Associate Professor with the Department of Industrial Engineering, University of Rome Tor Vergata, Italy. Previously, he has been a researcher at the University of Nottingham, Tokyo Institute of Technology, the University of the Basque Country, RWTH Aachen, and the University of Cassino. His research interests include soft robotics, mechanism design, and parallel manipulators, with applications in aerospace, nuclear, and healthcare. Dr Russo’s awards include the FIS Starting Grant, the IFToMM Young Delegate Award, and several best paper awards at international conferences. He served as Associate Editor for Transactions on Mechatronics, Robotics and Automation Magazine, and Robotics and Automation Letters. He is Co-Chair of the IEEE RAS Technical Committee on Mechanism and Design"
      },
      trumic: {
        name: "Maja Trumić",
        avatar: "assets/speakers/trumic.jpg",
        status: "",
        affiliation: "Delft University of Technology",
        title: "Tackling control challenges in soft robotics through model-based approaches",
        abstract: "The development of soft mechanical systems has opened new opportunities for safe and natural physical interaction, as well as for operation in confined and unstructured environments. At the same time, it has reintroduced fundamental control challenges that are well understood in rigid robotic systems, but take on new forms when compliance, underactuation, variability, and hard-to-measure mechanical states become central features of the robot.This talk addresses several of these challenges from a model-based control perspective. In particular, it focuses on three questions: Can we provide guarantees for the behavior of dynamics that are not directly actuated? How can controllers cope with the high variability and uncertainty inherent to soft robotic systems? And can we achieve closed-loop control of both position and stiffness, rather than treating compliance as a passive property of the hardware? Through examples involving soft continuum robots and articulated soft robots, the talk highlights how model-based methods can help make soft robotic behavior more predictable and robust.",
        bio: "Maja Trumić is an MSCA Postdoctoral Fellow at Delft University of Technology (TU Delft), at the Physical Intelligence Laboratory led by Prof. Cosimo Della Santina. Her research focuses on controlling soft robots in confined spaces, which is the core of her Marie Skłodowska-Curie project, Soft-Scout. Previously, she was a Research Associate at the University of Belgrade. She earned her Ph.D. in Robotics and Automation from the University of Palermo and the University of Belgrade in 2021, with a thesis focusing on stiffness estimation and adaptive control for soft robots. Her main research interests lie in soft robotics, nonlinear control theory and adaptive control."
      },
      trigili: {
        name: "Emilio Trigili",
        avatar: "assets/speakers/trigili.jpg",
        status: "",
        affiliation: "Scuola Superiore Sant'Anna",
        title: "Engineering human-robot interaction in upper-limb exoskeletons",
        abstract: "Wearable robotic exoskeletons represent a promising technology for upper-limb assistance and neurorehabilitation, where safety, comfort, and intuitive physical interaction are fundamental requirements. Although the control systems of exoskeletons play a central role towards their safe and intuitive use, the quality of human-robot interaction is strongly influenced by the design of the physical human-robot interface. In this perspective, mechanical design must be carefully considered to enable saf eand transparent interaction between the user and the robot. This talk will introduce ergonomic design principles of upper-limb wearable robots, starting from compliant actuation and solutions for achieving kinematic compatibility, including the use of series-elastic actuation and passive degrees of freedom as solutions to improve safety and comfort, accommodate movement variability, and reduce undesired interaction forces. Design examples of assistive and rehabilitation upper-limb exoskeletons developed at the Wearable Robotics Lab of Scuola Superiore Sant’Anna will be presented to illustrate the interplay between biomechanics-driven design and implementation constraints. Finally, robot-mediated human-human interaction will be introduced as an application domain in which the quality of the physical interface becomes particularly evident, with exoskeletons acting as bidirectional interfaces for cooperative motor tasks",
        bio: "Emilio Trigili is Assistant Professor at the BioRobotics Institute of Scuola Superiore Sant’Anna (SSSA). He completed his PhD in BioRobotics at SSSA in 2019. His research activities focus on the design, control and validation of upper- and lower-limb robotic exoskeletons for rehabilitation and assistance, as well as robotic lower-limb prostheses. He is currently the PI of the BioARMnext project, in collaboration with the Italian National Institute for Insurance against Accidents at Work (INAIL, Italy), aimed at developing a portable upper-limb exoskeleton to assist people with brachial plexus injuries in daily-life activities. "
      },
      tessari: {
        name: "Federico Tessari",
        avatar: "assets/speakers/tessari.jpg",
        status: "",
        affiliation: "Massachusetts Institute of Technology",
        title: "Complexity is a Feature, not a Bug: Rethinking Human Coordination for Computationally Intelligent Machines",
        abstract: "More than half a century ago, Richard Bellman described the curse of dimensionality: as system complexity increases, the space of possible states expands, rendering data sparse and control seemingly intractable. This challenge continues to shape modern robotics, mechatronics, and artificial intelligence. Even today’s most advanced humanoid robots embody only a fraction of human biomechanical complexity, yet struggle with tasks that humans perform effortlessly. Humans, by contrast, control more than 200 degrees of freedom and over 600 muscles through a neural system that is slow, noisy, and delayed. Despite these constraints, human movement is remarkably robust, adaptable, and versatile. This apparent contradiction – often referred to as the human motor control paradox – lies at the intersection of biomechanics, motor neuroscience, and robotics. My research addresses this paradox directly. In this talk, I argue that human movement should not be viewed as the outcome of instantaneous global optimization, but rather as the expression of structured, expandable coordination architectures that make high-dimensional control computationally tractable. I introduce the Synergy Expansion Hypothesis, a framework that reinterprets coordination not merely as dimensionality reduction, but as a generative and scalable control principle. I also present mathematical tools designed to probe the geometry of high-dimensional biological and robotic systems, enabling a more principled understanding of coordination structure. I further examine how these principles can inform the design and control for intelligent machines. Finally, I present preliminary translational results applying these ideas to stroke rehabilitation and human–robot interaction. Together, these findings bridge biomechanical models, stochastic motor behavior, and control theory, offering a mechanistic foundation for scalable coordination. I conclude by arguing that embracing – rather than simplifying – human movement complexity can guide the development of computationally intelligent technologies that are efficient, interpretable, and inherently human-centered.",
        bio: "Federico Tessari is a Research Scientist in the Department of Mechanical Engineering at the Massachusetts Institute of Technology (MIT). He received his PhD in Mechanical Engineering in 2021 through a joint program between the Italian Institute of Technology and the Polytechnic University of Turin, Italy. His research lies at the intersection of biomechanics, neuromotor control, and robotics. He investigates the principles underlying human motor coordination and translates these insights into the design and control of personalized, dexterous robotic systems, with a particular focus on assistive and rehabilitative technologies. His work seeks to bridge biological motor control and engineering design, reshaping how complexity is understood and leveraged in both humans and robots. Dr. Tessari is an active member of the Society for Neuroscience and the International Consortium for Rehabilitation Robotics. He has received several awards, including the 2024 Trainee Professional Development Award from the Society for Neuroscience and the IEEE Best Paper Award at IROS 2024. He has also received research presentation awards at the Polytechnic University of Turin (2019) and at MIT’s Mechanical Engineering Research Exhibition (2023). He has delivered invited seminars and guest lectures across the United States and Europe, including at Johns Hopkins University (Cerebellar Seminar and LCSR Seminar), Northeastern University (Action Club), the Italian Institute of Technology, the Sant’Anna School of Advanced Studies (Biorobotics Institute), and the Technical University of Munich."
      }

    document.addEventListener('DOMContentLoaded', () => {
      // Parse query string for speaker id
      const params = new URLSearchParams(window.location.search);
      const speakerId = params.get('id');

      const cardContainer = document.getElementById('speaker-card-container');
      const errorBox = document.getElementById('error-box');

      // Check if speakerId exists and has data
      if (speakerId && speakersData[speakerId]) {
        const data = speakersData[speakerId];

        // Populate details
        document.getElementById('page-title').textContent = `${data.name} Profile - The Mechatronic Arc`;
        document.getElementById('meta-description').setAttribute('content', `Detailed speaker profile and talk details for ${data.name} at the workshop.`);

        const avatar = document.getElementById('speaker-avatar');
        avatar.src = data.avatar;
        avatar.alt = data.name;

        // Handle object positioning for specific images
        if (speakerId === 'saveriano') {
          avatar.style.objectPosition = '50% 60%';
        }

        document.getElementById('speaker-name').textContent = data.name;
        document.getElementById('speaker-affiliation').textContent = data.affiliation;

        // Handle confirmation status tag
        const statusTag = document.getElementById('speaker-status');
        if (data.status) {
          statusTag.textContent = data.status;
          statusTag.style.display = 'inline-block';
        } else {
          statusTag.style.display = 'none';
        }

        document.getElementById('talk-title').textContent = data.title;
        document.getElementById('talk-abstract').textContent = data.abstract;
        document.getElementById('speaker-bio').textContent = data.bio;

        // Hide error and show profile
        cardContainer.style.display = 'grid';
        errorBox.style.display = 'none';
      } else {
        // Show error box, hide card
        cardContainer.style.display = 'none';
        errorBox.style.display = 'block';
        document.getElementById('page-title').textContent = 'Speaker Not Found - The Mechatronic Arc';
      }
    });
  </script>
